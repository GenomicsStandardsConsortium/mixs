          significant causal influences on your sample or specimen. We recommend using EnvO terms which are of smaller spatial
          grain than your entry for env_broad_scale. Terms, such as anatomical sites, from other OBO Library ontologies which
          interoperate with EnvO (e.g. UBERON) are accepted in this field. EnvO documentation about how to use the field:
          https://github.com/EnvironmentOntology/envo/wiki/Using-ENVO-with-MIxS.'
