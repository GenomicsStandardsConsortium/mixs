        new: 'Report the major environmental system the sample or specimen came from. The system(s) identified should have
          a coarse spatial grain, to provide the general environmental context of where the sampling was done (e.g. in the
          desert or a rainforest). We recommend using subclasses of EnvO’s biome class:  http://purl.obolibrary.org/obo/ENVO_00000428.
