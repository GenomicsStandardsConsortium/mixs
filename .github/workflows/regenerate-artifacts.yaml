name: Regenerate and verify generated artifacts

# The generated artifacts committed under project/, src/mixs/datamodel/, and contrib/ are
# consumed by downstream tools; EBI OLS loads project/owl/mixs.owl.ttl from raw main, so the
# committed artifacts must not lag src/mixs/schema/mixs.yaml (#1240).
#
# The OWL is not byte-reproducible: RDF/Turtle serialization reorders triples and relabels
# blank nodes on every run (same 46k triples, different text), so it cannot be verified by a
# text diff. project/jsonschema/mixs.schema.json IS fully deterministic and carries no
# generation timestamp, and it is a complete representation of the schema, so it is used as the
# canary for whether the schema content actually changed:
#   - pull_request / manual dispatch: regenerate and FAIL if the committed JSON Schema differs.
#   - push to main: regenerate everything and, only when the JSON Schema changed, commit the
#     refreshed artifacts (including the reordered OWL) so the committed OWL stays current.

on:
  push:
    branches: [main]
    paths:
      - 'src/mixs/schema/mixs.yaml'
      - 'src/sparql/**'
      - 'project-generator-config.yaml'
      - 'Makefile'
  pull_request:
    paths:
      - 'src/mixs/schema/mixs.yaml'
      - 'src/sparql/**'
      - 'project-generator-config.yaml'
      - 'Makefile'
  workflow_dispatch:

# Least privilege by default; only the push-to-main job that commits needs write.
permissions:
  contents: read

jobs:
  verify:
    # Runs on pull requests and manual dispatch with a read-only token, so untrusted PR code
    # executed via `make` cannot push to the repo.
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: make install

      - name: Regenerate the JSON Schema (the deterministic canary)
        run: make gen-project

      - name: Fail if the committed JSON Schema is out of sync
        run: |
          # git add -A so a newly created (untracked) output is detected, not just edits.
          git add -A project/jsonschema/
          if git diff --staged --quiet -- project/jsonschema/; then
            echo "project/jsonschema/mixs.schema.json is in sync with the schema."
          else
            echo "::error::project/jsonschema/mixs.schema.json is out of sync with src/mixs/schema/mixs.yaml. Run 'make gen-project' (and 'make owl' / 'make all-contrib') and commit the results."
            git diff --staged --stat -- project/jsonschema/
            exit 1
          fi

  regenerate:
    # Runs only on push to main, with a write token, to refresh the committed artifacts.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: make install

      - name: Regenerate all artifacts
        run: |
          make gen-project
          make owl
          make all-contrib

      - name: Commit refreshed artifacts when the schema content changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # The JSON Schema is deterministic, so use it to decide whether content actually
          # changed. The OWL reorders on every run, so gating on the JSON Schema avoids
          # churning the OWL on no-op runs. git add -A catches newly created outputs too.
          git add -A project/jsonschema/
          if git diff --staged --quiet -- project/jsonschema/; then
            echo "No schema content change (JSON Schema unchanged); nothing to commit."
          else
            git add -A project/ src/mixs/datamodel/ contrib/
            git commit -m "Regenerate artifacts from mixs.yaml [skip ci]"
            git push
          fi
