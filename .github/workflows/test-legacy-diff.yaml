---
name: Test Legacy Diff

on:
  pull_request:
    paths:
      - "src/mixs/diff/**"
      - "tests/test_legacy_diff.py"
      - "tests/conftest.py"
      - "assets/legacy_format_profiles/**"
      - "assets/between_diff_mappings/**"
  push:
    branches: [main]
    paths:
      - "src/mixs/diff/**"
      - "tests/test_legacy_diff.py"
      - "tests/conftest.py"
  workflow_dispatch:

jobs:
  test-legacy-diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies (including legacy-diff group)
        run: poetry install --with legacy-diff

      - name: Run legacy diff tests
        run: poetry run python -m pytest tests/test_legacy_diff.py -v --tb=short
