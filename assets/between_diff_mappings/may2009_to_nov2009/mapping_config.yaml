# MIxS May 2009 to Nov 2009 term mapping configuration
#
# This transition involved:
# 1. Splitting geographic_location into multiple specific fields
# 2. Moving environmental package names out of terms list (they became package metadata)
# 3. Adding environmental_package as a term to reference which package applies
#
# May 2009: Migs_mims_miens_051109.xlsx (headerless early format)
# Nov 2009: Migs_mims_miens_231109.xlsx (first format with headers)

splits:
  # Geographic location was split into component fields
  geographic_location:
    - geographic_location_(latitude_and_longitude)
    - geographic_location_(depth)
    - geographic_location_(altitude/elevation)
    - geographic_location_(country)

deletions:
  # Environmental package names were moved from terms to package metadata
  # These weren't terms in the traditional sense - they were package identifiers
  # that got mixed into the term list in the early headerless format
  air:
    reason: "Package name moved to package metadata; not a term"
  host_associated:
    reason: "Package name moved to package metadata; not a term"
  human_associated:
    reason: "Package name moved to package metadata; not a term"
  human_gut:
    reason: "Package name moved to package metadata; not a term"
  human_oral:
    reason: "Package name moved to package metadata; not a term"
  human_skin:
    reason: "Package name moved to package metadata; not a term"
  human_vaginal:
    reason: "Package name moved to package metadata; not a term"
  microbial_mat/biofilm:
    reason: "Package name moved to package metadata; not a term"
  miscellaneous_natural_or_artificial_environment:
    reason: "Package name moved to package metadata; not a term"
  plant_associated:
    reason: "Package name moved to package metadata; not a term"
  sediment:
    reason: "Package name moved to package metadata; not a term"
  soil:
    reason: "Package name moved to package metadata; not a term"
  wastewater/sludge:
    reason: "Package name moved to package metadata; not a term"
  water:
    reason: "Package name moved to package metadata; not a term"
