# Mapping configuration for v1.1 → v1.2 Word document transition
# MIGS 1.2 Candidate trimmed the specification significantly, removing several
# terms that were later restored in subsequent versions.

# Renames: old_name → new_name
renames:
  # Simplified naming - same section, same requirements, definition added
  habitat_type: habitat

# Deletions: terms removed with documented reasons
# Many of these terms were restored in later versions (May 2009 Excel)
deletions:
  host:
    reason: >
      Removed in v1.2 Candidate. A new term 'specific_host' was added with
      different semantics (taxonomic identification vs general host concept).
      The terms are related but not a direct rename.
  binning_method:
    reason: >
      Metagenomics-related term removed in v1.2 Candidate draft.
      Not restored in main spec lineage.
  encoded_traits:
    reason: >
      Removed in v1.2 Candidate. Restored in May 2009 Excel version.
  estimated_community_diversity:
    reason: >
      Metagenomics term removed in v1.2 Candidate.
      Not restored in main spec lineage.
  library_construction:
    reason: >
      Removed in v1.2 Candidate. Related concepts appear later as
      library_reads_sequenced, library_screening_strategy, library_size,
      library_vector in May 2009 Excel.
  sample_volume:
    reason: >
      Sampling detail removed in v1.2 Candidate. Related concept
      amount_or_size_of_sample_collected added in May 2009 Excel.
  sampling_strategy:
    reason: >
      Removed in v1.2 Candidate. Related concepts sample_collection_device_or_method
      and sample_material_treatment added in May 2009 Excel.
  trophic_level:
    reason: >
      Removed in v1.2 Candidate. Restored in May 2009 Excel version.
