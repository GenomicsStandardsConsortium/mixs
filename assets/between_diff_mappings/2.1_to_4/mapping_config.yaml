# MIxS v2.1 to v4 term mapping configuration (POOLED v2.1)
#
# IMPORTANT: This config is for comparing POOLED v2.1 files:
#   v2.1: Migs_mims_miens + MIMARKS
#   v4: MIxS_210514.xls (single file)
#
# Major changes:
# - Core terms: environment split, country/source_mat renamed back
# - Package terms: host-associated terms prefixed with "host_"
# - New package: built_environment added

renames:
  # Core v2.1 renames (new names back to old names in v4)
  country: geo_loc_name
  source_mat_identifiers: source_mat_id
  submit_to_insdc: submitted_to_insdc

  # Package term renames - host_* prefix added in v4
  age: host_age
  blood_press_diast: host_blood_press_diast
  blood_press_syst: host_blood_press_syst
  body_habitat: host_body_habitat
  body_mass_index: host_body_mass_index
  body_product: host_body_product
  body_site: host_body_site
  diet: host_diet
  disease_stat: host_disease_stat
  dry_mass: host_dry_mass
  family_relationship: host_family_relationship
  genotype: host_genotype
  height: host_height
  hiv_stat: host_hiv_stat
  infra_specific_name: host_infra_specific_name
  infra_specific_rank: host_infra_specific_rank
  last_meal: host_last_meal
  life_stage: host_life_stage
  occupation: host_occupation
  phenotype: host_phenotype
  pulse: host_pulse
  sex: host_sex
  substrate: host_substrate
  tot_mass: host_tot_mass
  wet_mass: host_wet_mass
  height_or_length: host_length

  # Water package renames
  current: water_current

  # Soil package renames
  tot_n: tot_nitro
  tot_org_c: tot_org_carb
  water_content_soil: water_content
  samp_weight_dna_ext: samp_vol_we_dna_ext

splits:
  # Core v2.1's consolidated 'environment' was split back into three terms
  environment:
    targets:
      - env_biome
      - env_feature
      - env_material
    description: "Single 'environment' field was split into three ENVO-based terms for greater precision"

deletions:
  # MIMARKS terms that were superseded by the env_* terms in v4
  biome:
    reason: "MIMARKS term; superseded by env_biome in v4 (same concept, new naming)"
  feature:
    reason: "MIMARKS term; superseded by env_feature in v4 (same concept, new naming)"
  material:
    reason: "MIMARKS term; superseded by env_material in v4 (same concept, new naming)"

  # Package terms removed/restructured
  other:
    reason: "Generic term removed; replaced with specific fields"
