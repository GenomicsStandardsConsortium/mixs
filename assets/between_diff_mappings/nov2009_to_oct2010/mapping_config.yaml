# MIxS Nov 2009 to Oct 2010 term mapping configuration
#
# This transition involved a major naming convention change from verbose
# descriptive names to abbreviated structured comment names.
#
# Nov 2009: Migs_mims_miens_231109.xlsx (verbose naming)
# Oct 2010: MIGS_MIMS_18_10_10.xlsx + MIENS_18_10_10.xlsx (abbreviated naming)

renames:
  # Geographic location was split into multiple fields
  # geographic_location_(latitude_and_longitude) -> lat_lon
  # geographic_location_(depth) -> depth (handled separately)
  # geographic_location_(altitude/elevation) -> alt_elev
  # geographic_location_(country) -> geo_loc_name
  geographic_location_(latitude_and_longitude): lat_lon
  geographic_location_(depth): depth
  geographic_location_(altitude/elevation): alt_elev
  geographic_location_(country): geo_loc_name

  # Verbose to abbreviated renames
  health_or_disease_status_of_specific_host_at_time_of_collection: health_disease_stat
  host_specificty_or_range: host_spec_range
  isolation_and_growth_condition: isol_growth_condt
  extrachromosomal_elements: extrachrom_elements
  library_reads_sequenced: lib_reads_seqd
  library_screening_strategy: lib_screen
  library_size: lib_size
  library_vector: lib_vector
  amount_or_size_of_sample_collected: samp_size
  nucleic_acid_amplification: nucl_acid_amp
  nucleic_acid_extraction: nucl_acid_ext
  observed_biotic_relationship: biotic_relationship
  pathogenicity: pathogenicity
  known_pathogenicity: pathogenicity
  environmental_package: env_package
  number_of_replicons: num_replicons
  reference_for_biomaterial: ref_biomaterial
  source_material_identifiers: source_mat_id
  submitted_to_insdc: submitted_to_insdc

  # Additional verbose to abbreviated renames found in diff output
  pcr_conditions: pcr_cond
  relationship_to_oxygen: rel_to_oxygen
  relevant_electronic_resources: url
  relevant_standard_operating_procedures: sop
  sample_collection_device_or_method: samp_collect_device
  sample_material_treatment: samp_mat_process
  sequence_quality_check: seq_quality_check
  sequencing_method: seq_meth
  submit_to_insdc: submitted_to_insdc
  subspecific_genetic_lineage: subspecf_gen_lin

splits:
  # Environment was split into biome/feature/material
  environment:
    - biome
    - feature
    - material

deletions:
  # Terms removed without replacement
  chimera_check:
    reason: "Removed in Oct 2010; re-added later as chimera_check"
