# MIxS Terminology by Version
# ============================
#
# Documents naming conventions, grouping terminology, and structural changes
# across MIxS schema versions. This glossary helps understand what changed
# between versions and why diffs may show certain patterns.
#
# Reference documentation. The diff tool supports v4+ comparisons;
# earlier versions are documented here for historical context.
#
# Version history:
#   v1.1 (~2005): Earliest MIGS Word document
#   v1.2 (~2006): MIGS Candidate draft, trimmed spec
#   v1.5-may2009: First Excel format
#   v1.6-nov2009: Structural reorganization (packages extracted)
#   v1.8-oct2010: Systematic term abbreviation
#   v2.0 (Dec 2010): Standardized Excel format
#   v2.1 (Jan 2011): Introduced MIMARKS (renamed from MIENS)
#   v4 (2014): Restored env_* terms, added built_environment package
#   v5 (2017): Naming standardization, added MIXS IDs
#   v6.0 (2020): LinkML migration, CamelCase naming
#   v6.2+ (2022+): Schema refinements, new extensions

terminology:
  # ==========================================================================
  # CHECKLIST TERMINOLOGY
  # ==========================================================================
  checklist:
    v1.1_v1.2:
      names:
        - MIGS_EU  # MIGS for Eukaryotes
        - MIGS_BA  # MIGS for Bacteria/Archaea
        - MIGS_PL  # MIGS for Plasmids
        - MIGS_VI  # MIGS for Viruses
        - MIGS_ORG  # MIGS for Organelles
        - ME  # Metagenome/Environmental
      format: "UPPERCASE_UNDERSCORE"
      notes: |
        Word document era. ME = Metagenome/Environmental sequences.
        These were the original MIGS checklists from the earliest specs.

    v1.5_may2009:
      names:
        - MIGS_EU, MIGS_BA, MIGS_PL, MIGS_VI, MIGS_ORG
        - ME (replaced by MIMS in later versions)
        - MIENS_S  # Environmental Sequences - survey
        - MIENS_C  # Environmental Sequences - cultured
      format: "UPPERCASE_UNDERSCORE"
      notes: |
        First Excel format. MIENS (Minimum Information about any ENvironmental
        Sequence) introduced for marker gene sequences.

    v1.6_nov2009:
      names:
        - MIGS_EU, MIGS_BA, MIGS_PL, MIGS_VI, MIGS_ORG
        - MIMS  # Renamed from ME
        - MIMARKS_S  # Renamed from MIENS_S
        - MIMARKS_C  # Renamed from MIENS_C
      format: "UPPERCASE_UNDERSCORE"
      changes_from_may2009:
        - renamed: "ME -> MIMS"
        - renamed: "MIENS_S -> MIMARKS_S"
        - renamed: "MIENS_C -> MIMARKS_C"
      notes: |
        MIENS renamed to MIMARKS (Marker gene Sequences).
        ME renamed to MIMS (Metagenome/Environmental Sequences).

    v2.0:
      names:
        - MIGS_EU  # MIGS for Eukaryotes
        - MIGS_BA  # MIGS for Bacteria
        - MIGS_PL  # MIGS for Plasmids
        - MIGS_VI  # MIGS for Viruses
        - MIGS_ORG  # MIGS for Organelles
        - MIMS  # Metagenome sequences
        - MIENS_S  # Environmental Sequences - survey
        - MIENS_C  # Environmental Sequences - cultured
      format: "UPPERCASE_UNDERSCORE"
      notes: |
        MIENS = Minimum Information about any ENvironmental Sequence
        This was the original naming before MIMARKS was introduced.

    v2.1:
      names:
        - MIGS_EU
        - MIGS_BA
        - MIGS_PL
        - MIGS_VI
        - MIGS_ORG
        - MIMS
        - MIMARKS_S  # Renamed from MIENS_S
        - MIMARKS_C  # Renamed from MIENS_C
      format: "UPPERCASE_UNDERSCORE"
      changes_from_v2.0:
        - renamed: "MIENS_S -> MIMARKS_S"
        - renamed: "MIENS_C -> MIMARKS_C"
      notes: |
        MIMARKS = Minimum Information about a MARKer gene Sequence
        MIENS was renamed to MIMARKS to better reflect marker gene focus.

    v4:
      names:
        - MIGS.eu
        - MIGS.ba
        - MIGS.pl
        - MIGS.vi
        - MIGS.org
        - MIMS
        - MIMARKS.survey
        - MIMARKS.specimen
      format: "MixedCase.suffix"
      changes_from_v2.1:
        - renamed: "MIGS_EU -> MIGS.eu"
        - renamed: "MIGS_BA -> MIGS.ba"
        - renamed: "MIMARKS_S -> MIMARKS.survey"
        - renamed: "MIMARKS_C -> MIMARKS.specimen"
      notes: |
        Switched from underscore to dot notation.
        MIMARKS_C renamed to MIMARKS.specimen for clarity.

    v5:
      names:
        - MIGS.eu
        - MIGS.ba
        - MIGS.pl
        - MIGS.vi
        - MIGS.org
        - MIMS
        - MIMARKS.survey
        - MIMARKS.specimen
      format: "MixedCase.suffix"
      notes: "Same as v4, naming stabilized."

    v6.0:
      names:
        - MigsEu
        - MigsBa
        - MigsPl
        - MigsVi
        - MigsOrg
        - Mims
        - MimarksS
        - MimarksC
      format: "CamelCase"
      changes_from_v5:
        - renamed: "MIGS.eu -> MigsEu"
        - renamed: "MIGS.ba -> MigsBa"
        - renamed: "MIMARKS.survey -> MimarksS"
        - renamed: "MIMARKS.specimen -> MimarksC"
      notes: |
        LinkML migration introduced CamelCase class names.
        All dots and underscores removed for LinkML compatibility.

  # ==========================================================================
  # PACKAGE/EXTENSION TERMINOLOGY
  # ==========================================================================
  package:
    v2.0:
      term: "Environmental Package"
      names:
        - air
        - host-associated
        - human-associated
        - human-gut
        - human-oral
        - human-skin
        - human-vaginal
        - microbial mat/biofilm
        - miscellaneous natural or artificial environment
        - plant-associated
        - sediment
        - soil
        - wastewater/sludge
        - water
      format: "lowercase-hyphenated"
      count: 14
      notes: "Original environmental packages covering major habitat types."

    v2.1:
      term: "Environmental Package"
      names:
        - air
        - host-associated
        - human-associated
        - human-gut
        - human-oral
        - human-skin
        - human-vaginal
        - microbial mat/biofilm
        - miscellaneous natural or artificial environment
        - plant-associated
        - sediment
        - soil
        - wastewater/sludge
        - water
      format: "lowercase-hyphenated"
      count: 14
      notes: "Same as v2.0."

    v4:
      term: "Environmental Package"
      names:
        - air
        - built_environment
        - host-associated
        - human-associated
        - human-gut
        - human-oral
        - human-skin
        - human-vaginal
        - microbial mat/biofilm
        - miscellaneous natural or artificial environment
        - plant-associated
        - sediment
        - soil
        - wastewater/sludge
        - water
      format: "lowercase-mixed"
      count: 15
      changes_from_v2.1:
        - added: "built_environment"
      notes: |
        Added built_environment package for indoor/constructed environments.
        Mixed format: some hyphenated, some underscored.

    v5:
      term: "Environmental Package"
      names:
        - air
        - built environment
        - host-associated
        - human-associated
        - human-gut
        - human-oral
        - human-skin
        - human-vaginal
        - microbial mat/biofilm
        - miscellaneous natural or artificial environment
        - plant-associated
        - sediment
        - soil
        - wastewater/sludge
        - water
      format: "lowercase-mixed"
      count: 15
      changes_from_v4:
        - renamed: "built_environment -> built environment"
      notes: "Minor formatting change in built environment."

    v6.0:
      term: "Environmental Extension"
      names:
        - Air
        - BuiltEnvironment
        - HostAssociated
        - HumanAssociated
        - HumanGut
        - HumanOral
        - HumanSkin
        - HumanVaginal
        - MicrobialMatBiofilm
        - MiscellaneousNaturalOrArtificialEnvironment
        - PlantAssociated
        - Sediment
        - Soil
        - WastewaterSludge
        - Water
        - Agriculture
        - FoodAnimalAndAnimalFeed
        - FoodFarmEnvironment
        - FoodFoodProductionFacility
        - FoodHumanFoods
        - HydrocarbonResourcesCores
        - HydrocarbonResourcesFluidsSwabs
        - Symbiont-associated
      format: "CamelCase"
      count: 23
      changes_from_v5:
        - renamed: "air -> Air"
        - renamed: "built environment -> BuiltEnvironment"
        - renamed: "host-associated -> HostAssociated"
        - added: "Agriculture"
        - added: "FoodAnimalAndAnimalFeed"
        - added: "FoodFarmEnvironment"
        - added: "FoodFoodProductionFacility"
        - added: "FoodHumanFoods"
        - added: "HydrocarbonResourcesCores"
        - added: "HydrocarbonResourcesFluidsSwabs"
        - added: "Symbiont-associated"
      terminology_change: "Package -> Extension"
      notes: |
        Terminology changed from "Environmental Package" to "Extension".
        All names converted to CamelCase for LinkML.
        Added 8 new extensions for food, agriculture, and hydrocarbon domains.

  # ==========================================================================
  # REQUIREMENT CODES
  # ==========================================================================
  requirement_codes:
    M:
      meaning: "Mandatory"
      description: "Must be provided for valid submission"
    X:
      meaning: "Optional"
      description: "May be provided but not required"
    C:
      meaning: "Conditional"
      description: "Required under certain conditions (see term definition)"
    E:
      meaning: "Environment-dependent"
      description: "Required depending on environmental package"
    "-":
      meaning: "Not applicable"
      description: "This term does not apply to this checklist/package"

  # ==========================================================================
  # TERM NAMING CONVENTIONS
  # ==========================================================================
  term_naming:
    v1.1_v1.2:
      format: "Descriptive_phrases_with_underscores"
      examples:
        - finishing_strategy
        - health_disease_status
        - geographic_location
        - nucleic_acid_preparation
      id_scheme: null
      notes: |
        Word document era. Human-readable term names.
        Some used slashes (microbial_mat/biofilm) or parentheses.

    v1.5_may2009:
      format: "verbose_underscore_with_parentheses"
      examples:
        - observed_biotic_relationship
        - health_or_disease_status_of_specific_host_at_time_of_collection
        - host_specificty_or_range  # Note: typo preserved from original
        - amount_or_size_of_sample_collected
      id_scheme: null
      notes: |
        First Excel format used very descriptive names.
        Some names extremely long for clarity.
        Package names (air, water, soil) initially mixed with terms.

    v1.6_nov2009:
      format: "verbose_underscore_with_parentheses"
      examples:
        - geographic_location_(latitude_and_longitude)
        - geographic_location_(depth)
        - geographic_location_(altitude/elevation)
        - geographic_location_(country)
      id_scheme: null
      notes: |
        geographic_location split into component fields.
        Package names moved out of term list.

    v1.8_oct2010:
      format: "abbreviated_underscore"
      examples:
        - lat_lon  # was geographic_location_(latitude_and_longitude)
        - seq_meth  # was sequencing_method
        - nucl_acid_ext  # was nucleic_acid_extraction
        - health_disease_stat  # was health_or_disease_status_of_specific_host...
      id_scheme: null
      notes: |
        Systematic abbreviation of all term names.
        33+ terms renamed to shorter forms.
        This naming convention persisted through v5.

    v2.0:
      format: "lowercase_underscore"
      examples:
        - geo_loc_name
        - source_mat_id
        - env_biome
      id_scheme: null
      notes: "Structured comment names, no formal IDs."

    v2.1:
      format: "lowercase_underscore"
      examples:
        - country  # renamed from geo_loc_name
        - source_mat_identifiers  # renamed from source_mat_id
        - environment  # consolidated from env_biome/feature/material
      id_scheme: null
      notes: "Some terms consolidated or renamed."

    v4:
      format: "lowercase_underscore"
      examples:
        - geo_loc_name  # restored from 'country'
        - source_mat_id  # restored
        - env_biome  # restored
      id_scheme: null
      notes: "Reverted some v2.1 changes, restored env_* naming."

    v5:
      format: "lowercase_underscore"
      examples:
        - geo_loc_name
        - source_mat_id
        - env_biome
      id_scheme: "MIXS:XXXXXXX"
      notes: "Added MIXS IDs (7-digit numeric) for persistent identifiers."

    v6.0:
      format: "snake_case"
      slot_uri_format: "MIXS:XXXXXXX"
      examples:
        - geo_loc_name
        - source_mat_id
        - env_broad_scale  # renamed from env_biome
        - env_local_scale  # renamed from env_feature
        - env_medium  # renamed from env_material
      id_scheme: "MIXS:XXXXXXX"
      notes: |
        Term names (slot names) remain snake_case.
        env_* terms renamed to *_scale/*_medium for clarity.
        MIXS IDs preserved and extended.

# ==========================================================================
# STRUCTURAL NOTES
# ==========================================================================
structural_notes:
  - version: "v1.1"
    format: "Word"
    notes: |
      Earliest MIGS specification. Word document with tables.
      22 terms defined. Included metagenomics terms (binning_method,
      estimated_community_diversity) that were later removed.

  - version: "v1.2"
    format: "Word"
    notes: |
      MIGS Candidate draft. Trimmed to 19 terms.
      Removed metagenomics-specific terms.
      Some terms like 'host' replaced with 'specific_host'.

  - version: "v1.5-may2009"
    format: "Excel (headerless)"
    notes: |
      First Excel format. 57 terms.
      Package names (air, water, soil, etc.) initially counted as terms.
      MIENS introduced for marker gene sequences.
      Early format without header rows.

  - version: "v1.6-nov2009"
    format: "Excel (with headers)"
    notes: |
      Major structural reorganization.
      Package names moved to proper package metadata (14 removed from terms).
      geographic_location split into 4 component fields.
      environmental_package term added as selector.
      Headers added to Excel format.

  - version: "v1.8-oct2010"
    format: "Excel"
    notes: |
      Systematic term name abbreviation.
      33+ terms renamed to shorter forms (e.g., sequencing_method -> seq_meth).
      Format stabilized.

  - version: "v2.0"
    format: "Excel"
    notes: |
      Separate Excel files for checklists and packages.
      Terms spread across multiple worksheets.

  - version: "v2.1"
    format: "Excel"
    notes: |
      Similar structure to v2.0.
      MIMARKS introduced as separate file.
      Some term consolidation (environment).

  - version: "v4"
    format: "Excel"
    notes: |
      Single consolidated Excel file.
      Restored some v2.0 term names.
      Added built_environment package.

  - version: "v5"
    format: "Excel"
    notes: |
      Continued Excel format.
      Added MIXS IDs for all terms.
      Improved validation syntax.

  - version: "v6.0"
    format: "LinkML YAML"
    notes: |
      Major format change to LinkML.
      Class hierarchy replaces explicit package membership.
      All names converted to language-compatible formats.
      Semantic web integration (URIs, ontology references).

  - version: "v6.2+"
    format: "LinkML YAML"
    notes: |
      Continued LinkML development.
      Added new extensions (food, agriculture, hydrocarbon).
      Enhanced validation and documentation.
