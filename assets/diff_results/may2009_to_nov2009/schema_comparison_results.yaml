  definition_changes:
    investigation_type:
      expected_value:
        old: '[eukoryote, bacteria, plasmid, virus, organelle, metagenome,miens-survey or miens-culture]'
        new: '[eukaryote, bacteria_archaea, plasmid, virus, organelle, metagenome,miens-survey or miens-culture]'
    relevant_electronic_resources:
      definition:
        old: ''
        new: ''''
    health_or_disease_status_of_specific_host_at_time_of_collection:
      definition:
        old: ''
        new: Health or disease status of specific host at time of collection
    project_name:
      expected_value:
        old: ''
        new: ''''
    pcr_primers:
      definition:
        old: PCR primers, barcodes and adaptors that were used to amplify the sequence. This field should contain all the
          primers used for a single PCR reaction if multiple forward or reverse primers are present in a single PCR reaction.
          The primer sequence should be reported in uppercase letters, however in case of the presence of a barcode or adaptor
          sequence, the relevant strectches of nucleotides should be reported in lowercase letters.
        new: PCR primers, barcodes and adaptors that were used to amplify the sequence of the targeted gene or locus. This
          field should contain all the primers used for a single PCR reaction if multiple forward or reverse primers are present
          in a single PCR reaction. The primer sequence should be reported in uppercase letters, however in case of the presence
          of a barcode or adaptor sequence, the relevant strectches of nucleotides should be reported in lowercase letters.
    finishing_strategy:
      expected_value:
        old: (status e.g. complete or draft [CV]; coverage [integer]; and contigs [integer])
        new: (status e.g. complete or draft [CV]; coverage [integer]; contigs [integer])
    assembly:
      expected_value:
        old: (assembly method [CV]; estimated error rate [unit]; and method of calculation [CV])
        new: (assembly method [CV]; estimated error rate [unit]; method of calculation [CV])
    nucleic_acid_amplification:
      expected_value:
        old: (amplification method and clean-up method) [PMID, DOI or url]
        new: (amplification method; clean-up method) [PMID, DOI or url]
    library_screening_strategy:
      expected_value:
        old: (enriched, screened, normalized) [CV]
        new: (e.g. enriched, screened, normalized) [CV]
    reference_for_biomaterial:
      definition:
        old: ''
        new: ''''
    ploidy:
      definition:
        old: The ploidy level of the genome (e.g. allopolyploid, haploid, diploid, triploid, tetraploid). It has implications
          for the downstream study of duplicated gene and regions of the genomes (and perhaps for difficulties in assembly).
          For PATO (Phenotypic Quality Ontology), please refer to http://www.ebi.ac.uk/ontology-lookup/browse.do?ontName=PATO
        new: The ploidy level of the genome (e.g. allopolyploid, haploid, diploid, triploid, tetraploid). It has implications
          for the downstream study of duplicated gene and regions of the genomes (and perhaps for difficulties in assembly).
          For terms, please select terms listed under class ploidy (PATO:001374) of PATO (Phenotypic Quality Ontology), please
          refer to http://www.ebi.ac.uk/ontology-lookup/browse.do?ontName=PATO
    experimental_factor:
      definition:
        old: 'A factor is a variable which is deliberately varied between trials, in order to study its influence on the outcome.
          There are two main types of variables to consider: treatment factors, when you are especially interested in studying
          how the outcome varies as a function of these factors; and confounders, other factors or covariates, such as temperature,
          pH, humidity, drift over time, etc... that may influence the outcome. In the biological or health sciences, age,
          sex and other characteristics of an individual may be confounders. This field accepts ontology terms from EFO. For
          a browser of EFO terms, please see http://www.ebi.ac.uk/ontology-lookup/browse.do?ontName=EFO'
        new: 'A factor is a variable which is deliberately varied between trials, in order to study its influence on the outcome.
          There are two main types of variables to consider: treatment factors, when you are especially interested in studying
          how the outcome varies as a function of these factors; and confounders, other factors or covariates, such as temperature,
          pH, humidity, drift over time, etc... that may influence the outcome. In the biological or health sciences, age,
          sex and other characteristics of an individual may be confounders. This field accepts ontology terms from EFO. For
          a browser of EFO terms, please see http://www.ebi.ac.uk/ontology-lookup/browse.do?ontName=EFO, Any treatment applied
          to the sample while or after retrieving the sample from environment. This field accepts OBI (Ontology for Biomedical
          Investigations), for a browser of OBI terms please see http://bioportal.bioontology.org/visualize/40547'
      expected_value:
        old: (the experimental design of the study) [EFO]
        new: (the experimental design of the study) [EFO and/or OBI]
    known_pathogenicity:
      expected_value:
        old: ''
        new: ''''
    isolation_and_growth_condition:
      definition:
        old: Publication reference in the form of pubmed ID (pmid) or digital object identifier (doi) for isolation and growth
          condition specifications of the organism/material
        new: Publication reference in the form of pubmed ID (pmid), digital object identifier (doi) or url for isolation and
          growth condition specifications of the organism/material
      expected_value:
        old: '[PMID or DOI]'
        new: '[PMID,DOI or url]'
    host_specificty_or_range:
      definition:
        old: ''
        new: The NCBI taxonomy identifier of the specific host if it is known
    submit_to_insdc:
      definition:
        old: Depending on the study (large-scale e.g. done with next generation sequencing technology or small-scale) sequences
          have to be submitted to SRA (Short Read Archives), ENA (European Nucleotide Archive) or via the classical Webin/Sequin
          systems to Genbank and EMBL
        new: Depending on the study (large-scale e.g. done with next generation sequencing technology or small-scale) sequences
          have to be submitted to SRA (Short Read Archives), ENA (European Nucleotide Archive), DRA (DDBJ Read Archive) or
          via the classical Webin/Sequin systems to Genbank, EMBL and DDBJ
    specific_host:
      definition:
        old: ''
        new: If there is a host involved, please provide its taxid (or environmental if not actually isolated from the dead
          or alive host - i.e. pathogen could be isolated from a swipe of a bench etc) and report whether it is a laboratory
          or natural host). From this we can calculate any number of groupings of hosts (e.g. animal vs plant, all fish hosts,
          etc)
    collection_date:
      definition:
        old: 'The time of sampling, either as an instance (single point in time) or interval. In case no exact time is available,
          the date/time can be right truncated i.e. all of these are valid times: 2008-01-23T19:23:10+00:00; 2008-01-23T19:23:10;
          2008-01-23; 2008-01; 2008; Except: 2008-01; 2008 all are ISO6801 compliant'
        new: 'The time of sampling, either as an instance (single point in time) or interval. In case no exact time is available,
          the date/time can be right truncated i.e. all of these are valid times: 2008-01-23T19:23:10+00:00; 2008-01-23T19:23:10;
          2008-01-23; 2008-01; 2008; Except: 2008-01; 2008 all are ISO8601 compliant'
      expected_value:
        old: '[UCT]'
        new: '[ISO8601]'
