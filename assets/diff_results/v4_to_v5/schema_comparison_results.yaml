  definition_changes:
    lib_vector:
      example:
        old: ''
        new: Bacteriophage P1
      occurrence:
        old: '1.0'
        new: '1'
    herbicide_regm:
      definition:
        old: information about treatment involving use of herbicides; information about treatment involving use of growth
          hormones; should include the name of herbicide, amount administered, treatment duration, interval and total experimental
          duration; can include multiple regimens
        new: Information about treatment involving use of herbicides; information about treatment involving use of growth
          hormones; should include the name of herbicide, amount administered, treatment regimen including how many times
          the treatment was repeated, how long each treatment lasted, and the start and end time of the entire treatment;
          can include multiple regimens
      example:
        old: ''
        new: atrazine;10 milligram per liter;R2/2018-05-11T14:30/2018-05-11T19:30/P1H30M
      expected_value:
        old: herbicide name;herbicide amount;treatment duration;interval;experimental duration
        new: herbicide name;herbicide amount;treatment interval and duration
      value_syntax:
        old: '{text};{float} {unit};{period};{interval};{period}'
        new: '{text};{float} {unit};{Rn/start_time/end_time/duration}'
    turbidity:
      definition:
        old: turbidity measurement
        new: Measure of the amount of cloudiness or haziness in water caused by individual particles
      example:
        old: ''
        new: 0.3 nephelometric turbidity units
      occurrence:
        old: '1.0'
        new: '1'
    tot_nitro:
      item:
        old: total nitrogen
        new: total nitrogen concentration
      definition:
        old: total nitrogen content of the sample
        new: 'Total nitrogen concentration of water samples, calculated by: total nitrogen = total dissolved nitrogen + particulate
          nitrogen. Can also be measured without filtering, reported as nitrogen'
      example:
        old: ''
        new: 50 micromole per liter
      occurrence:
        old: '1.0'
        new: '1'
      preferred_unit:
        old: microgram per liter, micromole per liter
        new: microgram per liter, micromole per liter, milligram per liter
    source_mat_id:
      example:
        old: ''
        new: MPI012345
    light_type:
      example:
        old: ''
        new: desk lamp
      value_syntax:
        old: '[natural light|electric light|no light]'
        new: '[natural light|electric light|desk lamp|flourescent lights|natural light|none]'
    porosity:
      expected_value:
        old: measurement value
        new: measurement value or range
      value_syntax:
        old: '{float} {unit}'
        new: '{float} - {float} {unit}'
      occurrence:
        old: '1.0'
        new: '1'
    secondary_treatment:
      occurrence:
        old: '1.0'
        new: '1'
    seq_meth:
      example:
        old: Sanger dideoxysequencing, pyrosequencing, polony
        new: Illumina HiSeq 1500
      expected_value:
        old: ''
        new: enumeration
      value_syntax:
        old: '{text}'
        new: '[MinION|GridION|PromethION|454 GS|454 GS 20|454 GS FLX|454 GS FLX+|454 GS FLX Titanium|454 GS Junior|Illumina
          Genome Analyzer|Illumina Genome Analyzer II|Illumina Genome Analyzer IIx|Illumina HiSeq 4000|Illumina HiSeq 3000|Illumina
          HiSeq 2500|Illumina HiSeq 2000|Illumina HiSeq 1500|Illumina HiSeq 1000|Illumina HiScanSQ|Illumina MiSeq|Illumina
          HiSeq X Five|Illumina HiSeq X Ten|Illumina NextSeq 500|Illumina NextSeq 550|AB SOLiD System|AB SOLiD System 2.0|AB
          SOLiD System 3.0|AB SOLiD 3 Plus System|AB SOLiD 4 System|AB SOLiD 4hq System|AB SOLiD PI System|AB 5500 Genetic
          Analyzer|AB 5500xl Genetic Analyzer|AB 5500xl-W Genetic Analysis System|Ion Torrent PGM|Ion Torrent Proton|Ion Torrent
          S5|Ion Torrent S5 XL|PacBio RS|PacBio RS II|Sequel|AB 3730xL Genetic Analyzer|AB 3730 Genetic Analyzer|AB 3500xL
          Genetic Analyzer|AB 3500 Genetic Analyzer|AB 3130xL Genetic Analyzer|AB 3130 Genetic Analyzer|AB 310 Genetic Analyzer|BGISEQ-500]'
      occurrence:
        old: '1.0'
        new: '1'
    org_matter:
      example:
        old: ''
        new: 1.75 milligram per cubic meter
      occurrence:
        old: '1.0'
        new: '1'
    diss_org_carb:
      definition:
        old: concentration of dissolved organic carbon
        new: Concentration of dissolved organic carbon in the sample, liquid portion of the sample, or aqueous phase of the
          fluid
      example:
        old: ''
        new: 197 micromole per liter
      occurrence:
        old: '1.0'
        new: '1'
      preferred_unit:
        old: micromole per liter
        new: micromole per liter, milligram per liter
    atmospheric_data:
      example:
        old: ''
        new: wind speed;9 knots
    sulfide:
      definition:
        old: concentration of sulfide
        new: Concentration of sulfide in the sample
      example:
        old: ''
        new: 2 micromole per liter
      occurrence:
        old: '1.0'
        new: '1'
      preferred_unit:
        old: micromole per liter, milligram per liter
        new: micromole per liter, milligram per liter, parts per million
    host_phenotype:
      definition:
        old: phenotype of host. For Phenotypic quality Ontology (PATO) (v 2013-10-28) terms, please see http://purl.bioontology.org/ontology/PATO
        new: Phenotype of human or other host. For phenotypic quality ontology (pato) (v 2018-03-27) terms, please see http://purl.bioontology.org/ontology/pato.
          For Human Phenotype Ontology (HP) (v 2018-06-13) please see http://purl.bioontology.org/ontology/HP
      example:
        old: ''
        new: elongated [PATO:0001154]
      expected_value:
        old: PATO
        new: PATO or HP
      value_syntax:
        old: '{term}'
        new: '{termLabel} {[termID]}'
      occurrence:
        old: '1.0'
        new: '1'
    pressure:
      definition:
        old: pressure to which the sample is subject, in atmospheres
        new: Pressure to which the sample is subject to, in atmospheres
      example:
        old: ''
        new: 50 atmosphere
      occurrence:
        old: '1.0'
        new: '1'
    samp_store_temp:
