      example:
        old: ''
        new: https://mobio.com/media/wysiwyg/pdfs/protocols/12888.pdf
      value_syntax:
        old: '{PMID|DOI|URL}'
        new: '{PMID}|{DOI}|{URL}'
      occurrence:
        old: '1.0'
        new: '1'
    target_gene:
      occurrence:
        old: '1.0'
        new: '1'
    target_subfragment:
      occurrence:
        old: '1.0'
        new: '1'
    assembly_name:
