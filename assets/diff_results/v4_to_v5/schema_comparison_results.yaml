        old: ''
        new: heat pump
    sulfate:
      definition:
        old: concentration of sulfate
        new: Concentration of sulfate in the sample
      example:
        old: ''
        new: 5 micromole per liter
      occurrence:
        old: '1.0'
        new: '1'
      preferred_unit:
        old: micromole per liter, milligram per liter
        new: micromole per liter, milligram per liter, parts per million
    host_body_product:
      definition:
        old: substance produced by the body, e.g. stool, mucus, where the sample was obtained from
        new: Substance produced by the body, e.g. Stool, mucus, where the sample was obtained from. For foundational model
          of anatomy ontology (fma) or Uber-anatomy ontology (UBERON) terms, please see https://www.ebi.ac.uk/ols/ontologies/fma
          or https://www.ebi.ac.uk/ols/ontologies/uberon
