        new: '1'
      preferred_unit:
        old: milligram per cubic meter per day
        new: milligram per cubic meter per day, micromole oxygen per liter per hour
    samp_sort_meth:
      definition:
        old: method by which samples are sorted
        new: Method by which samples are sorted; open face filter collecting total suspended particles, prefilter to remove
          particles larger than X micrometers in diameter, where common values of X would be 10 and 2.5 full size sorting
          in a cascade impactor.
      value_syntax:
        old: open face filter collecting total suspended particles, "prefilter to remove particles larger than X micrometers
          in diameter, where common values of X would be 10 and 2.5 full size sorting in a cascade impactor"
        new: '{text}'
    flooding:
      occurrence:
        old: '1.0'
        new: '1'
    tot_carb:
      occurrence:
        old: '1.0'
        new: '1'
    radiation_regm:
      definition:
        old: information about treatment involving exposure of plant or a plant part to a particular radiation regimen; should
          include the radiation type, amount or intensity administered, treatment duration, interval and total experimental
          duration; can include multiple radiation regimens
        new: Information about treatment involving exposure of plant or a plant part to a particular radiation regimen; should
          include the radiation type, amount or intensity administered, treatment regimen including how many times the treatment
          was repeated, how long each treatment lasted, and the start and end time of the entire treatment; can include multiple
          radiation regimens
      example:
        old: ''
        new: gamma radiation;60 gray;R2/2018-05-11T14:30/2018-05-11T19:30/P1H30M
      expected_value:
        old: radiation type name;radiation amount;treatment duration;interval;experimental duration
        new: radiation type name;radiation amount;treatment interval and duration
      value_syntax:
        old: '{text};{float} {unit};{period};{interval};{period}'
        new: '{text};{float} {unit};{Rn/start_time/end_time/duration}'
      preferred_unit:
        old: becquerel
        new: rad, gray
    perturbation:
      definition:
        old: type of perturbation, e.g. chemical administration, physical disturbance, etc., coupled with time that perturbation
          occurred; can include multiple perturbation types
        new: Type of perturbation, e.g. chemical administration, physical disturbance, etc., coupled with perturbation regimen
          including how many times the perturbation was repeated, how long each perturbation lasted, and the start and end
          time of the entire perturbation period; can include multiple perturbation types
      example:
        old: ''
        new: antibiotic addition;R2/2018-05-11T14:30Z/2018-05-11T19:30Z/P1H30M
      expected_value:
        old: perturbation type name;time interval
        new: perturbation type name;perturbation interval and duration
      value_syntax:
        old: '{text};{interval}'
        new: '{text};{Rn/start_time/end_time/duration}'
    sewage_type:
      occurrence:
        old: '1.0'
        new: '1'
    suspend_part_matter:
      example:
        old: ''
        new: 0.5 milligram per liter
      occurrence:
        old: '1.0'
        new: '1'
    filter_type:
      example:
        old: ''
        new: HEPA
      value_syntax:
        old: '[chemical air filter|electrostatic air treatment|gas-phase air treatment|HEPA filter|low-MERV pleated media|particulate
          air filter|ultraviolet air treatment]'
        new: '[particulate air filter|chemical air filter|low-MERV pleated media|HEPA|electrostatic|gas-phase or ultraviolet
          air treatments]'
    methane:
      example:
        old: ''
        new: 1800 parts per billion
      occurrence:
        old: '1.0'
        new: '1'
      preferred_unit:
        old: micromole per liter
        new: micromole per liter, parts per billion, parts per million
    link_class_info:
      value_syntax:
        old: '{PMID|DOI|URL}'
        new: '{PMID}|{DOI}|{URL}'
      occurrence:
        old: '1.0'
        new: '1'
    tillage:
      example:
        old: ''
        new: chisel
    slope_aspect:
      occurrence:
        old: '1.0'
        new: '1'
    n_alkanes:
      example:
        old: ''
        new: n-hexadecane;100 milligram per liter
    pre_treatment:
      occurrence:
        old: '1.0'
        new: '1'
    gravity:
      definition:
        old: information about treatment involving use of gravity factor to study various types of responses in presence,
          absence or modified levels of gravity; can include multiple treatments
        new: Information about treatment involving use of gravity factor to study various types of responses in presence,
          absence or modified levels of gravity; treatment regimen including how many times the treatment was repeated, how
          long each treatment lasted, and the start and end time of the entire treatment; can include multiple treatments
      example:
        old: ''
        new: 12 g;R2/2018-05-11T14:30/2018-05-11T19:30/P1H30M
      expected_value:
        old: gravity factor value;treatment duration;interval;experimental duration
        new: gravity factor value;treatment interval and duration
      value_syntax:
        old: '{float} {unit};{period};{interval};{period}'
        new: '{float} {unit};{Rn/start_time/end_time/duration}'
    specific_host:
      definition:
        old: If there is a host involved, please provide its taxid (or environmental if not actually isolated from the dead
          or alive host - i.e. pathogen could be isolated from a swipe of a bench etc) and report whether it is a laboratory
          or natural host). From this we can calculate any number of groupings of hosts (e.g. animal vs plant, all fish hosts,
          etc)
        new: If there is a host involved, please provide its taxid (or environmental if not actually isolated from the dead
          or alive host - i.e. a pathogen could be isolated from a swipe of a bench etc) and report whether it is a laboratory
          or natural host)
      example:
        old: ''
        new: '9606'
      value_syntax:
        old: ''
        new: '{NCBI taxid}|{text}'
      occurrence:
        old: '1.0'
        new: '1'
    organism_count:
      definition:
        old: total count of any organism per gram or volume of sample, should include name of organism followed by count;
          can include multiple organism counts
        new: 'Total cell count of any organism (or group of organisms) per gram, volume or area of sample, should include
          name of organism followed by count. The method that was used for the enumeration (e.g. qPCR, atp, mpn, etc.) Should
          also be provided. (example: total prokaryotes; 3.5e7 cells per ml; qpcr)'
      example:
        old: ''
        new: total prokaryotes;3.5e7 cells per milliliter;qPCR
      expected_value:
        old: organism name;measurement value
        new: organism name;measurement value;enumeration
      value_syntax:
        old: '{text};{float} {unit}'
        new: '{text};{float} {unit};[qPCR|ATP|MPN|other]'
      preferred_unit:
        old: number of organism per cubic meter
        new: number of cells per cubic meter, number of cells per milliliter, number of cells per cubic centimeter
    biotic_relationship:
      definition:
        old: Is it free-living or in a host and if the latter what type of relationship is observed
        new: Description of relationship(s) between the subject organism and other organism(s) it is associated with. E.g.,
          parasite on species X; mutualist with species Y. The target organism is the subject of the relationship, and the
          other organism(s) is the object
      example:
        old: ''
        new: free living
      value_syntax:
        old: '[free living|parasite|commensal|symbiont]'
        new: '[free living|parasitism|commensalism|symbiotic|mutualism]'
      occurrence:
        old: '1.0'
        new: '1'
    smoker:
      example:
        old: ''
        new: 'yes'
      occurrence:
        old: '1.0'
        new: '1'
    mean_peak_frict_vel:
      example:
        old: ''
        new: 1 meter per second
      occurrence:
        old: '1.0'
        new: '1'
    env_biome -> env_broad_scale:
      item:
        old: environment (biome)
        new: broad-scale environmental context
      definition:
        old: 'Biomes are defined based on factors such as plant structures, leaf types, plant spacing, and other factors like
          climate. Biome should be treated as the descriptor of the broad ecological context of a sample. Examples include:
          desert, taiga, deciduous woodland, or coral reef. EnvO (v 2013-06-14) terms can be found via the link: www.environmentontology.org/Browse-EnvO'
        new: 'In this field, report which major environmental system your sample or specimen came from. The systems identified
          should have a coarse spatial grain, to provide the general environmental context of where the sampling was done
          (e.g. were you in the desert or a rainforest?). We recommend using subclasses of ENVO’s biome class: http://purl.obolibrary.org/obo/ENVO_00000428.
          Format (one term): termLabel [termID], Format (multiple terms): termLabel [termID]|termLabel [termID]|termLabel
          [termID]. Example: Annotating a water sample from the photic zone in middle of the Atlantic Ocean, consider: oceanic
          epipelagic zone biome [ENVO:01000033]. Example: Annotating a sample from the Amazon rainforest consider: tropical
          moist broadleaf forest biome [ENVO:01000228]. If needed, request new terms on the ENVO tracker, identified here:
          http://www.obofoundry.org/ontology/envo.html'
      example:
        old: ''
        new: forest biome [ENVO:01000174]
      expected_value:
        old: EnvO
        new: 'Add terms that identify the major environment type(s) where your sample was collected. Recommend subclasses
          of biome [ENVO:00000428]. Multiple terms can be separated by one or more pipes e.g.:  mangrove biome [ENVO:01000181]|estuarine
          biome [ENVO:01000020]'
      value_syntax:
        old: '{term}'
        new: '{termLabel} {[termID]}'
      occurrence:
        old: '1.0'
        new: '1'
    env_feature -> env_local_scale:
      item:
        old: environment (feature)
        new: local environmental context
      definition:
        old: 'Environmental feature level includes geographic environmental features. Compared to biome, feature is a descriptor
          of the more local environment. Examples include: harbor, cliff, or lake. EnvO (v 2013-06-14) terms can be found
          via the link: www.environmentontology.org/Browse-EnvO'
        new: 'In this field, report the entity or entities which are in your sample or specimen’s local vicinity and which
          you believe have significant causal influences on your sample or specimen. Please use terms that are present in
          ENVO and which are of smaller spatial grain than your entry for env_broad_scale. Format (one term): termLabel [termID];
          Format (multiple terms): termLabel [termID]|termLabel [termID]|termLabel [termID]. Example: Annotating a pooled
          sample taken from various vegetation layers in a forest consider: canopy [ENVO:00000047]|herb and fern layer [ENVO:01000337]|litter
          layer [ENVO:01000338]|understory [01000335]|shrub layer [ENVO:01000336]. If needed, request new terms on the ENVO
          tracker, identified here: http://www.obofoundry.org/ontology/envo.html'
      example:
        old: ''
        new: litter layer [ENVO:01000338]
      expected_value:
        old: EnvO
        new: 'Add terms that identify environmental entities having causal influences upon the entity at time of sampling,
          multiple terms can be separated by pipes, e.g.:  shoreline [ENVO:00000486]|intertidal zone [ENVO:00000316]'
      value_syntax:
        old: '{term}'
        new: '{termLabel} {[termID]}'
      occurrence:
        old: '1.0'
        new: '1'
    env_material -> env_medium:
      item:
        old: environment (material)
        new: environmental medium
      definition:
        old: 'The environmental material level refers to the material that was displaced by the sample, or material in which
          a sample was embedded, prior to the sampling event. Environmental material terms are generally mass nouns. Examples
          include: air, soil, or water. EnvO (v 2013-06-14) terms can be found via the link: www.environmentontology.org/Browse-EnvO'
        new: 'In this field, report which environmental material or materials (pipe separated) immediately surrounded your
          sample or specimen prior to sampling, using one or more subclasses of ENVO’s environmental material class: http://purl.obolibrary.org/obo/ENVO_00010483.
          Format (one term): termLabel [termID]; Format (multiple terms): termLabel [termID]|termLabel [termID]|termLabel
          [termID]. Example: Annotating a fish swimming in the upper 100 m of the Atlantic Ocean, consider: ocean water [ENVO:00002151].
          Example: Annotating a duck on a pond consider: pond water [ENVO:00002228]|air ENVO_00002005. If needed, request
          new terms on the ENVO tracker, identified here: http://www.obofoundry.org/ontology/envo.html'
      example:
        old: ''
        new: soil [ENVO:00001998]
      expected_value:
        old: EnvO
        new: 'Add terms that identify the material displaced by the entity at time of sampling. Recommend subclasses of environmental
          material [ENVO:00010483]. Multiple terms can be separated by pipes e.g.: estuarine water [ENVO:01000301]|estuarine
          mud [ENVO:00002160]'
      value_syntax:
        old: '{term}'
        new: '{termLabel} {[termID]}'
      occurrence:
        old: '1.0'
        new: '1'
    annot_source -> annot:
      item:
        old: annotation source
        new: annotation
      definition:
        old: For cases where annotation was provided by a community jamboree or model organism database rather than by a specific
          submitter
        new: Tool used for annotation, or for cases where annotation was provided by a community jamboree or model organism
          database rather than by a specific submitter
      example:
        old: ''
        new: prokka
      expected_value:
        old: annotation source description
        new: name of tool or pipeline used, or annotation source description
      occurrence:
        old: '1.0'
        new: '1'
