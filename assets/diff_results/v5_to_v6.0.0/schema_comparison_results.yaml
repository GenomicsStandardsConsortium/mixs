        new: ''
      occurrence:
        old: '1'
        new: ''
    texture -> soil_texture:
      item:
        old: texture
        new: soil texture
      definition:
        old: The relative proportion of different grain sizes of mineral particles in a soil, as described using a standard
          system; express as % sand (50 um to 2 mm), silt (2 um to 50 um), and clay (<2 um) with textural name (e.g., silty
          clay loam) optional.
        new: The relative proportion of different grain sizes of mineral particles in a soil, as described using a standard
          system; express as % sand (50 um to 2 mm), silt (2 um to 50 um), and clay (<2 um) with textural name (e.g., silty
          clay loam) optional
      expected_value:
