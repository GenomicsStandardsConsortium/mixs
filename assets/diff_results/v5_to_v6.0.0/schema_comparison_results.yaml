        new: Reference database (i.e. sequences not generated as part of the current study) used to cluster new genomes in
          "species-level" OTUs, if any
      expected_value:
        old: database and version
        new: ''
      value_syntax:
        old: '{database};{version}'
        new: ''
      occurrence:
        old: '1'
        new: ''
      section:
        old: sequencing
        new: ''
    votu_seq_comp_appr -> otu_seq_comp_appr:
      item:
        old: vOTU sequence comparison approach
        new: OTU sequence comparison approach
      definition:
        old: Tool and thresholds used to compare sequences when computing "species-level" vOTUs
        new: Tool and thresholds used to compare sequences when computing "species-level" OTUs
