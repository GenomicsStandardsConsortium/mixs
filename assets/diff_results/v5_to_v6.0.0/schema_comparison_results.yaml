    assembly_qual:
      definition:
        old: 'The assembly quality category is based on sets of criteria outlined for each assembly quality category. For
          MISAG/MIMAG; Finished: Single, validated, contiguous sequence per replicon without gaps or ambiguities with a consensus
          error rate equivalent to Q50 or better. High Quality Draft:Multiple fragments where gaps span repetitive regions.
          Presence of the 23S, 16S and 5S rRNA genes and at least 18 tRNAs. Medium Quality Draft:Many fragments with little
          to no review of assembly other than reporting of standard assembly statistics. Low Quality Draft:Many fragments
          with little to no review of assembly other than reporting of standard assembly statistics. Assembly statistics include,
          but are not limited to total assembly size, number of contigs, contig N50/L50, and maximum contig length. For MIUVIG;
          Finished: Single, validated, contiguous sequence per replicon without gaps or ambiguities, with extensive manual
          review and editing to annotate putative gene functions and transcriptional units. High-quality draft genome: One
          or multiple fragments, totaling ≥ 90% of the expected genome or replicon sequence or predicted complete. Genome
          fragment(s): One or multiple fragments, totalling < 90% of the expected genome or replicon sequence, or for which
          no genome size could be estimated'
        new: 'The assembly quality category is based on sets of criteria outlined for each assembly quality category. For
          MISAG/MIMAG; Finished: Single, validated, contiguous sequence per replicon without gaps or ambiguities with a consensus
          error rate equivalent to Q50 or better. High Quality Draft:Multiple fragments where gaps span repetitive regions.
          Presence of the large subunit (LSU) RNA, small subunit (SSU) and the presence of 5.8S rRNA or 5S rRNA depending
          on whether it is a eukaryotic or prokaryotic genome, respectively. Medium Quality Draft:Many fragments with little
          to no review of assembly other than reporting of standard assembly statistics. Low Quality Draft:Many fragments
          with little to no review of assembly other than reporting of standard assembly statistics. Assembly statistics include,
          but are not limited to total assembly size, number of contigs, contig N50/L50, and maximum contig length. For MIUVIG;
          Finished: Single, validated, contiguous sequence per replicon without gaps or ambiguities, with extensive manual
          review and editing to annotate putative gene functions and transcriptional units. High-quality draft genome: One
          or multiple fragments, totaling   90% of the expected genome or replicon sequence or predicted complete. Genome
          fragment(s): One or multiple fragments, totalling < 90% of the expected genome or replicon sequence, or for which
          no genome size could be estimated'
      expected_value:
        old: enumeration
        new: AssemblyQualEnum
      value_syntax:
        old: '[Finished genome|High-quality draft genome|Medium-quality draft genome|Low-quality draft genome|Genome fragment(s)]'
        new: ''
      occurrence:
        old: '1'
        new: ''
      section:
        old: sequencing
        new: ''
    propagation:
      definition:
        old: 'This field is specific to different taxa. For phages: lytic/lysogenic, for plasmids: incompatibility group,
          for eukaryotes: sexual/asexual (Note: there is the strong opinion to name phage propagation obligately lytic or
          temperate, therefore we also give this choice'
        new: 'The type of reproduction from the parent stock. Values for this field is specific to different taxa. For phage
          or virus: lytic/lysogenic/temperate/obligately lytic. For plasmids: incompatibility group. For eukaryotes: sexual/asexual'
      expected_value:
        old: 'for virus: lytic, lysogenic, temperate, obligately lytic; for plasmid: incompatibility group; for eukaryote:
          asexual, sexual'
        new: string
      value_syntax:
        old: '{text}'
        new: ''
      occurrence:
        old: '1'
        new: ''
      section:
        old: nucleic acid sequence source
        new: ''
    salinity:
      definition:
        old: Salinity is the total concentration of all dissolved salts in a water sample. While salinity can be measured
          by a complete chemical analysis, this method is difficult and time consuming. More often, it is instead derived
          from the conductivity measurement. This is known as practical salinity. These derivations compare the specific conductance
          of the sample to a salinity standard such as seawater
        new: The total concentration of all dissolved salts in a liquid or solid sample. While salinity can be measured by
          a complete chemical analysis, this method is difficult and time consuming. More often, it is instead derived from
          the conductivity measurement. This is known as practical salinity. These derivations compare the specific conductance
          of the sample to a salinity standard such as seawater
