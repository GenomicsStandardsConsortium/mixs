    pcr_primers:
      definition:
        old: PCR primers, barcodes and adaptors that were used to amplify the sequence of the targeted gene or locus. This
          field should contain all the primers used for a single PCR reaction if multiple forward or reverse primers are present
          in a single PCR reaction. The primer sequence should be reported in uppercase letters, however in case of the presence
          of a barcode or adaptor sequence, the relevant strectches of nucleotides should be reported in lowercase letters.
        new: PCR primers that were used to amplify the sequence of the targeted gene, locus or subfragment. This field should
          contain all the primers used for a single PCR reaction if multiple forward or reverse primers are present in a single
          PCR reaction. The primer sequence should be reported in uppercase letters
