        new: FWD:{dna} REV:{dna}
      occurrence:
        old: ''
        new: '1'
    trophic_level:
      definition:
        old: 'Trophic levels are the feeding position in a food chain such as primary producers, herbivore, primary carnivore,
          etc. Photosynthetic organisms form the first trophic level, the producers. Herbivores form the second trophic level,
          while carnivores form the third and even the fourth trophic levels. Microbes can be a range of producers (e.g. chemolithotroph).
          Possible types are: autotroph,carboxydotroph,chemoautotroph,chemoheterotroph,chemolithoautotroph,chemolithotroph,chemoorganoheterotroph,chemoorganotroph,chemosynthetic,chemotroph,copiotroph,diazotroph,facultative,autotroph,heterotroph,lithoautotroph,lithoheterotroph,lithotroph,methanotroph,methylotroph,mixotroph,obligate,chemoautolithotroph,oligotroph,organoheterotroph,organotroph,photoautotroph,photoheterotroph,photolithoautotroph,photolithotroph,photosynthetic,phototroph'
        new: Trophic levels are the feeding position in a food chain. Microbes can be a range of producers (e.g. chemolithotroph)
      example:
        old: ''
        new: '"'
      expected_value:
        old: (e.g. autotroph, heterotroph) [CV]
        new: enumeration
      value_syntax:
        old: ''
        new: '[autotroph| carboxydotroph| chemoautotroph| chemoheterotroph| chemolithoautotroph| chemolithotroph| chemoorganoheterotroph|
          chemoorganotroph| chemosynthetic| chemotroph| copiotroph| diazotroph| facultative| autotroph| heterotroph| lithoautotroph|
          lithoheterotroph| lithotroph| methanotroph| methylotroph| mixotroph| obligate| chemoautolithotroph| oligotroph|
          organoheterotroph| organotroph| photoautotroph| photoheterotroph| photolithoautotroph| photolithotroph| photosynthetic|
          phototroph]'
      occurrence:
