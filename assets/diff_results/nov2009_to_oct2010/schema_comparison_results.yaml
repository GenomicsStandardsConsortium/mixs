  definition_changes:
    experimental_factor:
      definition:
        old: 'A factor is a variable which is deliberately varied between trials, in order to study its influence on the outcome.
          There are two main types of variables to consider: treatment factors, when you are especially interested in studying
          how the outcome varies as a function of these factors; and confounders, other factors or covariates, such as temperature,
          pH, humidity, drift over time, etc... that may influence the outcome. In the biological or health sciences, age,
          sex and other characteristics of an individual may be confounders. This field accepts ontology terms from EFO. For
          a browser of EFO terms, please see http://www.ebi.ac.uk/ontology-lookup/browse.do?ontName=EFO, Any treatment applied
          to the sample while or after retrieving the sample from environment. This field accepts OBI (Ontology for Biomedical
          Investigations), for a browser of OBI terms please see http://bioportal.bioontology.org/visualize/40547'
        new: Experimental factors are essentially the variable aspects of an experiment design which can be used to describe
          an experiment, or set of experiments, in an increasingly detailed manner. This field accepts ontology terms from
          Experimental Factor Ontology (EFO) and/or Ontology for Biomedical Investigations (OBI). For a browser of EFO (v132)
          terms, please see http://bioportal.bioontology.org/visualize/44641; for a browser of OBI (v1.0) terms please see
          http://bioportal.bioontology.org/visualize/40832
      expected_value:
        old: (the experimental design of the study) [EFO and/or OBI]
        new: text or EFO and/or OBI
      value_syntax:
        old: ''
        new: '{term|text}'
      occurrence:
        old: ''
        new: '1'
