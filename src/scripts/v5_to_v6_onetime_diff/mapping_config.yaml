version_pair: "5 to 6.0.0"
description: >-
  Validated rename and deletion mappings for MIxS v5 (2018 Excel) to v6.0.0
  (2022 LinkML). Every rename target was verified to exist in the mixs6.0.0 tag.
  Renames whose old name still exists in v6.0.0 were dropped, because those terms
  are shared rather than renamed (the renames to soil_horizon, soil_texture, and
  soil_texture_meth happened after v6.0.0, in the v6-to-pre-7 transition).
renames:
  health_disease_stat: host_disease_stat
  16s_recover: x_16s_recover
  16s_recover_software: x_16s_recover_software
  votu_class_appr: otu_class_appr
  votu_db: otu_db
  votu_seq_comp_appr: otu_seq_comp_appr
splits: {}
merges: {}
deletions:
  env_package:
    reason: "Structural change in v6; package membership now handled via class hierarchy"
  investigation_type:
    reason: "Removed in v6; investigation type now implicit in checklist selection"
  submitted_to_insdc:
    reason: "Removed in v6; INSDC submission status not tracked in schema"
